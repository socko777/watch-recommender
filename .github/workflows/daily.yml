name: Daily Watch Rotation

on:
  schedule:
    # Every 5 minutes (testing)
    - cron: '*/5 * * * *'

  # Allows manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-watch-rotation:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run watch rotation script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python send_watch.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add state.json

          git commit -m "Update watch rotation state" || echo "No changes to commit"

          git push